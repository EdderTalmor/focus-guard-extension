<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <title>Focus Guard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
      padding: 0;
    }

    /* Header */
    .header {
      padding: 20px 20px 16px;
      background: linear-gradient(135deg, rgba(255, 59, 48, 0.1), rgba(255, 149, 0, 0.05));
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      font-size: 20px;
    }

    .logo h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .status {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .status.active {
      background: rgba(52, 199, 89, 0.15);
      color: #34c759;
    }

    .header-sub {
      font-size: 11px;
      color: #787ca5;
      margin-top: 4px;
    }

    /* Facebook quick-block banner */
    .fb-banner {
      padding: 12px 20px;
      background: linear-gradient(135deg, rgba(255, 59, 48, 0.12), rgba(255, 59, 48, 0.06));
      border-bottom: 1px solid rgba(255, 59, 48, 0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .fb-banner-text {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fb-banner-icon {
      font-size: 18px;
    }

    .fb-banner-label {
      font-size: 13px;
      font-weight: 600;
      color: #ff6b6b;
    }

    .fb-banner-sub {
      font-size: 10px;
      color: #787ca5;
      margin-top: 2px;
    }

    .fb-toggle {
      position: relative;
      width: 44px;
      height: 24px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .fb-toggle.on {
      background: rgba(255, 59, 48, 0.4);
    }

    .fb-toggle-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: #787ca5;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .fb-toggle.on .fb-toggle-knob {
      left: 22px;
      background: #ff3b30;
    }

    /* Site list */
    .section {
      padding: 16px 20px;
    }

    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #787ca5;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .site-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .site-list::-webkit-scrollbar { width: 3px; }
    .site-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .site-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      margin-bottom: 6px;
      transition: all 0.15s;
    }

    .site-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .site-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .site-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: rgba(255, 59, 48, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .site-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #787ca5;
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .remove-btn:hover {
      color: #ff3b30;
      background: rgba(255, 59, 48, 0.1);
    }

    /* Add site */
    .add-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .add-input {
      flex: 1;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #e8e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-input:focus {
      border-color: rgba(255, 59, 48, 0.4);
    }

    .add-input::placeholder {
      color: #787ca5;
    }

    .add-btn {
      padding: 10px 14px;
      background: rgba(255, 59, 48, 0.15);
      border: 1px solid rgba(255, 59, 48, 0.3);
      border-radius: 8px;
      color: #ff3b30;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .add-btn:hover {
      background: rgba(255, 59, 48, 0.25);
    }

    /* Preset chips */
    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 10px;
    }

    .preset-chip {
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      font-size: 11px;
      color: #787ca5;
      cursor: pointer;
      transition: all 0.15s;
    }

    .preset-chip:hover {
      background: rgba(255, 59, 48, 0.1);
      border-color: rgba(255, 59, 48, 0.25);
      color: #ff3b30;
    }

    .preset-chip.blocked {
      background: rgba(255, 59, 48, 0.1);
      border-color: rgba(255, 59, 48, 0.25);
      color: #ff3b30;
      text-decoration: line-through;
    }

    /* Footer */
    .footer {
      padding: 12px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      text-align: center;
      font-size: 10px;
      color: #787ca5;
    }

    .footer a {
      color: #ff3b30;
      text-decoration: none;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 24px 0;
      color: #787ca5;
      font-size: 13px;
    }

    .empty-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    /* Breather info */
    .breather-info {
      padding: 10px 20px;
      background: rgba(52, 199, 89, 0.06);
      border-top: 1px solid rgba(52, 199, 89, 0.1);
      font-size: 11px;
      color: #34c759;
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <span class="logo-icon">🛡️</span>
        <h1>Focus Guard</h1>
      </div>
      <span class="status active" id="status">Active</span>
    </div>
    <div class="header-sub" id="site-count">Loading...</div>
  </div>

  <div class="fb-banner">
    <div class="fb-banner-text">
      <span class="fb-banner-icon">🚫</span>
      <div>
        <div class="fb-banner-label">Already don't allow Facebook</div>
        <div class="fb-banner-sub">One-tap block for all Facebook domains</div>
      </div>
    </div>
    <div class="fb-toggle on" id="fb-toggle" onclick="toggleFacebook()">
      <div class="fb-toggle-knob"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Blocked Sites</div>
    <div class="site-list" id="site-list"></div>

    <div class="add-row">
      <input type="text" class="add-input" id="add-input" placeholder="e.g. tiktok.com">
      <button class="add-btn" id="add-btn">+ Block</button>
    </div>

    <div class="presets" id="presets"></div>
  </div>

  <div class="breather-info">
    🧘 15-second breathing pause after confirming access
  </div>

  <div class="footer">
    v1.1.0 · Made with 🛡️ by Edder
  </div>

  <script src="popup.js"></script>
  <script>
    // Facebook quick-block toggle
    const FB_DOMAINS = ["facebook.com", "fb.com", "fbcdn.net", "instagram.com"];
    
    function toggleFacebook() {
      const toggle = document.getElementById("fb-toggle");
      const isOn = toggle.classList.contains("on");
      
      if (isOn) {
        // Remove Facebook from blocked sites
        chrome.storage.sync.get("blockedSites", (data) => {
          let sites = data.blockedSites || [];
          sites = sites.filter(s => !FB_DOMAINS.some(fb => s.includes(fb)));
          chrome.storage.sync.set({ blockedSites: sites }, () => {
            toggle.classList.remove("on");
            renderSiteList();
          });
        });
      } else {
        // Add Facebook to blocked sites
        chrome.storage.sync.get("blockedSites", (data) => {
          let sites = data.blockedSites || [];
          FB_DOMAINS.forEach(domain => {
            if (!sites.includes(domain)) sites.push(domain);
          });
          chrome.storage.sync.set({ blockedSites: sites }, () => {
            toggle.classList.add("on");
            renderSiteList();
          });
        });
      }
    }

    // Check Facebook status on load
    function checkFacebookStatus() {
      chrome.storage.sync.get("blockedSites", (data) => {
        const sites = data.blockedSites || [];
        const fbBlocked = FB_DOMAINS.every(fb => sites.some(s => s.includes(fb)));
        const toggle = document.getElementById("fb-toggle");
        if (fbBlocked) {
          toggle.classList.add("on");
        } else {
          toggle.classList.remove("on");
        }
      });
    }

    // Initialize
    checkFacebookStatus();
  </script>
</body>
</html>
